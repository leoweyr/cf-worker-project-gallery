name: Deploy Cloudflare Worker
description: Deploy edge proxy worker to Cloudflare Workers.


inputs:
    workers_environment:
        description: Wrangler environment name.
        required: true
    ui_gallery_bundle_url:
        description: UI gallery bundle URL for edge proxy.
        required: true
    target_host_url_map:
        description: Target host URL map JSON for edge proxy.
        required: false
        default: ''
    cloudflare_api_token:
        description: Cloudflare API token.
        required: true
    cloudflare_account_id:
        description: Cloudflare account ID.
        required: true


runs:
    using: composite
    steps:
        -   name: 📂 Checkout Repository
            uses: actions/checkout@v4

        -   name: 🛠️ Config PNPM
            uses: pnpm/action-setup@v4

        -   name: 🛠️ Config Node.js
            uses: actions/setup-node@v4
            with:
                node-version: 20
                cache: pnpm

        -   name: 📦 Install Dependencies
            run: pnpm install --frozen-lockfile
            shell: bash

        -   name: 🚀 Deploy Worker
            uses: cloudflare/wrangler-action@v3
            env:
                TARGET_HOST_URL_MAP: ${{ inputs.target_host_url_map }}
            with:
                apiToken: ${{ inputs.cloudflare_api_token }}
                accountId: ${{ inputs.cloudflare_account_id }}
                workingDirectory: apps/edge-proxy
                command: >-
                    deploy
                    --env ${{ inputs.workers_environment }}
                    --var UI_GALLERY_BUNDLE_URL:${{ inputs.ui_gallery_bundle_url }}
                    --var TARGET_HOST_URL_MAP:$TARGET_HOST_URL_MAP
