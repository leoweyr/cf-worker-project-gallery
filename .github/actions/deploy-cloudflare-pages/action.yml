name: Deploy Cloudflare Pages
description: Build and deploy UI gallery to Cloudflare Pages.


inputs:
    deployment_environment:
        description: Deployment environment name.
        required: true
    pages_branch:
        description: Cloudflare pages branch.
        required: true
    pages_project:
        description: Cloudflare pages project name.
        required: true
    cloudflare_api_token:
        description: Cloudflare API token.
        required: true
    cloudflare_account_id:
        description: Cloudflare account ID.
        required: true
    github_token:
        description: GitHub token for deployment metadata.
        required: true


outputs:
    pages_url:
        description: Deployed Pages URL
        value: ${{ steps.deploy_pages.outputs.url }}


runs:
    using: composite
    steps:
        -   name: 📂 Checkout Repository
            uses: actions/checkout@v4

        -   name: 🛠️ Config PNPM
            uses: pnpm/action-setup@v4

        -   name: 🛠️ Config Node.js
            uses: actions/setup-node@v4
            with:
                node-version: 20
                cache: pnpm

        -   name: 📦 Install Dependencies
            run: pnpm install --frozen-lockfile
            shell: bash

        -   name: 🛠️ Sync UI Gallery GitHub Token
            if: ${{ inputs.github_token != '' }}
            shell: bash
            env:
                cloudflare_api_token: ${{ inputs.cloudflare_api_token }}
                cloudflare_account_id: ${{ inputs.cloudflare_account_id }}
                pages_project: ${{ inputs.pages_project }}
                ui_gallery_github_token: ${{ inputs.github_token }}
            run: |
                node <<'NODE'
                (async () => {
                    const cloudflareApiToken = process.env.cloudflare_api_token || '';
                    const cloudflareAccountId = process.env.cloudflare_account_id || '';
                    const pagesProject = process.env.pages_project || '';
                    const uiGalleryGitHubToken = process.env.ui_gallery_github_token || '';
                    const projectApiUrl = `https://api.cloudflare.com/client/v4/accounts/${cloudflareAccountId}/pages/projects/${pagesProject}`;
                    const requestHeaders = {
                        Authorization: `Bearer ${cloudflareApiToken}`,
                        'Content-Type': 'application/json'
                    };

                    const patchProjectResponse = await fetch(projectApiUrl, {
                        method: 'PATCH',
                        headers: requestHeaders,
                        body: JSON.stringify({
                            deployment_configs: {
                                preview: {
                                    env_vars: {
                                        UI_GALLERY_GITHUB_TOKEN: {
                                            type: 'secret_text',
                                            value: uiGalleryGitHubToken
                                        }
                                    }
                                },
                                production: {
                                    env_vars: {
                                        UI_GALLERY_GITHUB_TOKEN: {
                                            type: 'secret_text',
                                            value: uiGalleryGitHubToken
                                        }
                                    }
                                }
                            }
                        })
                    });

                    const patchProjectPayload = await patchProjectResponse.json().catch(() => null);

                    if (!patchProjectResponse.ok || !patchProjectPayload || patchProjectPayload.success !== true) {
                        console.error('❌ Failed to sync UI_GALLERY_GITHUB_TOKEN to Cloudflare Pages settings.');

                        if (patchProjectPayload) {
                            console.error(JSON.stringify(patchProjectPayload));
                        }

                        process.exit(1);
                    }

                    console.log('✅ Synced UI_GALLERY_GITHUB_TOKEN to Cloudflare Pages Preview and Production settings.');
                })().catch((error) => {
                    console.error('❌ Unexpected error while syncing UI_GALLERY_GITHUB_TOKEN.');

                    if (error instanceof Error) {
                        console.error(error.message);
                    } else {
                        console.error(String(error));
                    }

                    process.exit(1);
                });
                NODE

        -   name: 📝 Generate UI Gallery Bundle
            run: pnpm --filter @cf-worker-project-gallery/ui-gallery build
            shell: bash
            env:
                UI_GALLERY_GITHUB_TOKEN: ${{ inputs.github_token }}

        -   name: 🛠️ Sync Production Branch
            if: ${{ inputs.deployment_environment == 'Production' }}
            shell: bash
            env:
                cloudflare_api_token: ${{ inputs.cloudflare_api_token }}
                cloudflare_account_id: ${{ inputs.cloudflare_account_id }}
                pages_project: ${{ inputs.pages_project }}
                pages_branch: ${{ inputs.pages_branch }}
            run: |
                node <<'NODE'
                (async () => {
                    const cloudflareApiToken = process.env.cloudflare_api_token || '';
                    const cloudflareAccountId = process.env.cloudflare_account_id || '';
                    const pagesProject = process.env.pages_project || '';
                    const pagesBranch = process.env.pages_branch || '';
                    const projectApiUrl = `https://api.cloudflare.com/client/v4/accounts/${cloudflareAccountId}/pages/projects/${pagesProject}`;
                    
                    const requestHeaders = {
                        Authorization: `Bearer ${cloudflareApiToken}`,
                        'Content-Type': 'application/json'
                    };

                    const getProjectResponse = await fetch(projectApiUrl, {
                        method: 'GET',
                        headers: requestHeaders
                    });
                
                    const getProjectPayload = await getProjectResponse.json().catch(() => null);

                    if (!getProjectResponse.ok || !getProjectPayload || getProjectPayload.success !== true) {
                        console.error('❌ Failed to read Cloudflare Pages project settings.');
                        
                        if (getProjectPayload) {
                            console.error(JSON.stringify(getProjectPayload));
                        }
                
                        process.exit(1);
                    }

                    const currentProductionBranch = getProjectPayload.result?.production_branch || '';

                    if (currentProductionBranch === pagesBranch) {
                        console.log(`✅ Cloudflare Pages production branch is already '${pagesBranch}'.`);
                        return;
                    }

                    const patchProjectResponse = await fetch(projectApiUrl, {
                        method: 'PATCH',
                        headers: requestHeaders,
                        body: JSON.stringify({
                            production_branch: pagesBranch
                        })
                    });
                
                    const patchProjectPayload = await patchProjectResponse.json().catch(() => null);

                    if (!patchProjectResponse.ok || !patchProjectPayload || patchProjectPayload.success !== true) {
                        console.error('❌ Failed to update Cloudflare Pages production branch.');
                
                        if (patchProjectPayload) {
                            console.error(JSON.stringify(patchProjectPayload));
                        }
                
                        process.exit(1);
                    }

                    console.log(`✅ Updated Cloudflare Pages production branch from '${currentProductionBranch}' to '${pagesBranch}'.`);
                })().catch((error) => {
                    console.error('❌ Unexpected error while syncing Cloudflare Pages production branch.');
                
                    if (error instanceof Error) {
                        console.error(error.message);
                    } else {
                        console.error(String(error));
                    }
                
                    process.exit(1);
                });
                NODE

        -   name: 🚀 Deploy Pages
            id: deploy_pages
            uses: cloudflare/pages-action@v1
            with:
                apiToken: ${{ inputs.cloudflare_api_token }}
                accountId: ${{ inputs.cloudflare_account_id }}
                projectName: ${{ inputs.pages_project }}
                directory: packages/ui-gallery/dist
                branch: ${{ inputs.pages_branch }}
                gitHubToken: ${{ inputs.github_token }}
