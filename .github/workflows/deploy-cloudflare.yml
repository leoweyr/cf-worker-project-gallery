name: Deploy Cloudflare


on:
    push:
        branches:
            - develop
            - master
    workflow_dispatch:


concurrency:
    group: cloudflare-${{ github.event_name }}-${{ github.ref }}
    cancel-in-progress: true


permissions:
    contents: read


jobs:
    resolve_target:
        runs-on: ubuntu-latest
        outputs:
            deployment_environment: ${{ steps.resolve.outputs.deployment_environment }}
            workers_environment: ${{ steps.resolve.outputs.workers_environment }}
            pages_branch: ${{ steps.resolve.outputs.pages_branch }}
        steps:
            -   name: 🔍 Verify Deployment Target
                id: resolve
                run: |
                    if [ "${{ github.ref_name }}" = "develop" ]; then
                        echo 'deployment_environment=Preview' >> "$GITHUB_OUTPUT"
                        echo 'workers_environment=Preview' >> "$GITHUB_OUTPUT"
                        echo 'pages_branch=develop' >> "$GITHUB_OUTPUT"
                    elif [ "${{ github.ref_name }}" = "master" ]; then
                        echo 'deployment_environment=Production' >> "$GITHUB_OUTPUT"
                        echo 'workers_environment=Production' >> "$GITHUB_OUTPUT"
                        echo 'pages_branch=master' >> "$GITHUB_OUTPUT"
                    else
                        echo "❌ Unsupported branch: ${{ github.ref_name }}"
                        exit 1
                    fi

    deploy_pages:
        runs-on: ubuntu-latest
        needs:
            - resolve_target
        environment: ${{ needs.resolve_target.outputs.deployment_environment }}
        permissions:
            contents: read
            deployments: write
            pull-requests: write
        outputs:
            pages_url: ${{ steps.deploy_pages.outputs.pages_url }}
        steps:
            -   name: 📂 Checkout Repository
                uses: actions/checkout@v4

            -   name: 🚀 Deploy Pages
                id: deploy_pages
                uses: ./.github/actions/deploy-cloudflare-pages
                with:
                    deployment_environment: ${{ needs.resolve_target.outputs.deployment_environment }}
                    pages_branch: ${{ needs.resolve_target.outputs.pages_branch }}
                    pages_project: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
                    cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                    cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                    github_token: ${{ secrets.UI_GALLERY_GITHUB_TOKEN }}

    deploy_workers:
        runs-on: ubuntu-latest
        needs:
            - resolve_target
            - deploy_pages
        environment: ${{ needs.resolve_target.outputs.deployment_environment }}
        steps:
            -   name: 📂 Checkout Repository
                uses: actions/checkout@v4

            -   name: 🚀 Deploy Worker
                uses: ./.github/actions/deploy-cloudflare-workers
                with:
                    workers_environment: ${{ needs.resolve_target.outputs.workers_environment }}
                    ui_gallery_bundle_url: ${{ needs.deploy_pages.outputs.pages_url }}/global-ui-bundle.js
                    target_host_url_map: ${{ vars.CLOUDFLARE_TARGET_HOST_URL_MAP }}
                    cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                    cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
